
experiment:
  name: "Version_1"
  version: "1.0"
  seed: 31

data:
  dataset_name: "VOC-2012"
  dataset_path: "/kaggle/input/datasets/gopalbhattrai/pascal-voc-2012-dataset"
  train_dataset_path: "VOC2012_train_val/VOC2012_train_val"
  test_dataset_path: "VOC2012_test/VOC2012_test"
  output_path: "outputs/"

model:
  model_name: ""
  backbone: ""
  num_classes: 21
  class_labels:
    - background
    - aeroplane
    - bicycle
    - bird
    - boat
    - bottle
    - bus
    - car
    - cat
    - chair
    - cow
    - diningtable
    - dog
    - horse
    - motorbike
    - person
    - pottedplant
    - sheep
    - sofa
    - train
    - tvmonitor

training:
  optimizer: "AdamW"
  batch_size: 4
  stage1_num_epochs: 50
  stage2_num_epochs: 15
  stage3_num_epochs: 15
  learning_rate: 1e-3
  weight_decay: 0
